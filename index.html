<!DOCTYPE html>
<html lang="de-CH">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philipp Schoch</title>
    <meta name="description" content="Philipp Schoch in den Regierungsrat BL" />
    <meta name="robots" content="all" />
    <meta name="language" content="de-ch" />
    <meta name="google-site-verification" content="_KuUvM44KBqPSXD2mtpVYasTp60eg22jisJNUDM-AhU" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-green: #427E23;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            font-family: "Nunito Sans", sans-serif;
        }

        body {
            min-height: 100vh;
            position: relative;
            background-image: url("img/Philipp_Schoch_1920.webp");
            background-position: right center;
            background-repeat: no-repeat;
            background-size: cover;
            color: var(--brand-green);
            overflow: hidden;
        }


        @media (min-width: 1921px) {
            body {
                background-image: url("img/Philipp_Schoch_3200.webp");
            }
        }

        @media (max-width: 799px) {
            body {
                background-image: url("img/Philipp_Schoch_Mobile.webp");
                background-position: center center;
                background-size: auto 100%;
            }
        }

        .hero-copy {
            position: absolute;
            left: clamp(32px, 6vw, 120px);
            top: 50%;
            transform: translateY(-50%);
            max-width: min(55vw, 760px);
        }

        h1 {
            margin: 0;
            font-size: clamp(42px, 5.5vw, 80px);
            line-height: 1.05;
            font-weight: 500;
            color: var(--brand-green);
        }

        p {
            margin: 16px 0 0;
            font-size: clamp(18px, 1.8vw, 25px);
            line-height: 1.3;
            font-weight: 400;
            color: var(--brand-green);
        }

        .insta-link {
            position: absolute;
            left: clamp(24px, 3vw, 48px);
            bottom: clamp(24px, 4vh, 42px);
            width: clamp(38px, 4.2vw, 56px);
            display: inline-flex;
        }

        .insta-link img {
            width: 100%;
            height: auto;
            display: block;
        }

        @media (max-width: 900px) {
            .hero-copy {
                left: auto;
                right: clamp(16px, 4vw, 28px);
                top: auto;
                bottom: clamp(16px, 4vh, 26px);
                transform: none;
                max-width: min(72vw, 360px);
                text-align: right;
            }

            h1 {
                font-size: clamp(38px, 11vw, 62px);
            }

            p {
                margin-top: 10px;
                font-size: clamp(18px, 4.8vw, 25px);
            }

            .insta-link {
                left: clamp(16px, 4vw, 28px);
                right: auto;
                bottom: clamp(16px, 4vh, 26px);
                width: clamp(34px, 10vw, 46px);
            }
        }
    </style>
</head>
<body>
    <main class="hero-copy">
        <h1>Philipp Schoch</h1>
        <p>Hier finden Sie bald mehr zu mir</p>
    </main>

    <a class="insta-link" href="https://www.instagram.com/schoch_philipp/" aria-label="Instagram" target="_blank" rel="noopener noreferrer">
        <img src="img/insta.svg" alt="Instagram" />
    </a>
</body>
</html>
